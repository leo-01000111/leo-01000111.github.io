<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070a0e"/>
      <stop offset="100%" stop-color="#0a0f16"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="240" cy="80" rx="520" ry="340" fill="url(#glow1)"/>
  <ellipse cx="1020" cy="120" rx="440" ry="300" fill="url(#glow2)"/>

  <!-- Blueprint grid lines (subtle) -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="52" x2="1200" y2="52"/>
    <line x1="0" y1="104" x2="1200" y2="104"/>
    <line x1="0" y1="156" x2="1200" y2="156"/>
    <line x1="0" y1="208" x2="1200" y2="208"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="312" x2="1200" y2="312"/>
    <line x1="0" y1="364" x2="1200" y2="364"/>
    <line x1="0" y1="416" x2="1200" y2="416"/>
    <line x1="0" y1="468" x2="1200" y2="468"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="572" x2="1200" y2="572"/>
    <line x1="52" y1="0" x2="52" y2="630"/>
    <line x1="104" y1="0" x2="104" y2="630"/>
    <line x1="156" y1="0" x2="156" y2="630"/>
    <line x1="208" y1="0" x2="208" y2="630"/>
    <line x1="260" y1="0" x2="260" y2="630"/>
    <line x1="312" y1="0" x2="312" y2="630"/>
    <line x1="364" y1="0" x2="364" y2="630"/>
    <line x1="416" y1="0" x2="416" y2="630"/>
    <line x1="468" y1="0" x2="468" y2="630"/>
    <line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="572" y1="0" x2="572" y2="630"/>
    <line x1="624" y1="0" x2="624" y2="630"/>
    <line x1="676" y1="0" x2="676" y2="630"/>
    <line x1="728" y1="0" x2="728" y2="630"/>
    <line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="832" y1="0" x2="832" y2="630"/>
    <line x1="884" y1="0" x2="884" y2="630"/>
    <line x1="936" y1="0" x2="936" y2="630"/>
    <line x1="988" y1="0" x2="988" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1092" y1="0" x2="1092" y2="630"/>
    <line x1="1144" y1="0" x2="1144" y2="630"/>
  </g>

  <!-- Logo mark -->
  <rect x="80" y="200" width="64" height="64" rx="18" fill="url(#mark)"/>
  <circle cx="102" cy="222" r="9" fill="white" fill-opacity="0.5"/>

  <!-- Name -->
  <text x="162" y="228" font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, Arial" font-size="34" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="0.3">Leon Górecki</text>
  <text x="163" y="258" font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, Arial" font-size="20" fill="rgba(255,255,255,0.60)">Aerospace / Mechanical Engineering</text>

  <!-- Divider -->
  <line x1="80" y1="290" x2="560" y2="290" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>

  <!-- Headline -->
  <text x="80" y="350" font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, Arial" font-size="42" font-weight="700" fill="rgba(255,255,255,0.95)" letter-spacing="-0.3">Controls · ML · CAD · Structures</text>
  <text x="80" y="410" font-family="ui-sans-serif, system-ui, -apple-system, Helvetica, Arial" font-size="24" fill="rgba(255,255,255,0.60)">Python tooling for aerospace design and analysis</text>

  <!-- Tag chips -->
  <rect x="80" y="450" width="120" height="36" rx="18" fill="rgba(56,189,248,0.14)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
  <text x="140" y="473" font-family="ui-sans-serif, system-ui, Helvetica, Arial" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle">Python</text>

  <rect x="214" y="450" width="120" height="36" rx="18" fill="rgba(56,189,248,0.14)" stroke="rgba(56,189,248,0.35)" stroke-width="1"/>
  <text x="274" y="473" font-family="ui-sans-serif, system-ui, Helvetica, Arial" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle">Siemens NX</text>

  <rect x="348" y="450" width="120" height="36" rx="18" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <text x="408" y="473" font-family="ui-sans-serif, system-ui, Helvetica, Arial" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle">LaTeX</text>

  <rect x="482" y="450" width="120" height="36" rx="18" fill="rgba(167,139,250,0.14)" stroke="rgba(167,139,250,0.35)" stroke-width="1"/>
  <text x="542" y="473" font-family="ui-sans-serif, system-ui, Helvetica, Arial" font-size="15" fill="rgba(255,255,255,0.85)" text-anchor="middle">Control</text>

  <!-- URL -->
  <text x="80" y="572" font-family="ui-sans-serif, system-ui, Helvetica, Arial" font-size="18" fill="rgba(56,189,248,0.75)">leongorecki.eu</text>
</svg>

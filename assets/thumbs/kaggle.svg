<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 135">
  <rect width="240" height="135" rx="12" fill="#0a0f16"/>
  <!-- Background glow -->
  <radialGradient id="g" cx="30%" cy="50%" r="60%">
    <stop offset="0%" stop-color="#20beff" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#20beff" stop-opacity="0"/>
  </radialGradient>
  <rect width="240" height="135" rx="12" fill="url(#g)"/>
  <!-- Leaderboard bars -->
  <rect x="18" y="38" width="22" height="80" rx="4" fill="#20beff" fill-opacity="0.90"/>
  <rect x="46" y="55" width="22" height="63" rx="4" fill="#20beff" fill-opacity="0.72"/>
  <rect x="74" y="48" width="22" height="70" rx="4" fill="#20beff" fill-opacity="0.55"/>
  <rect x="102" y="66" width="22" height="52" rx="4" fill="#20beff" fill-opacity="0.40"/>
  <rect x="130" y="74" width="22" height="44" rx="4" fill="#20beff" fill-opacity="0.28"/>
  <!-- Base line -->
  <line x1="14" y1="118" x2="165" y2="118" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Rank medals -->
  <circle cx="29" cy="33" r="7" fill="#FFD700" fill-opacity="0.9"/>
  <text x="29" y="37" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" font-weight="800" fill="#0a0f16">1</text>
  <circle cx="57" cy="50" r="6" fill="rgba(192,192,192,0.85)"/>
  <text x="57" y="54" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="8" font-weight="800" fill="#0a0f16">2</text>
  <circle cx="85" cy="43" r="6" fill="rgba(205,127,50,0.80)"/>
  <text x="85" y="47" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="8" font-weight="800" fill="#0a0f16">3</text>
  <!-- "K" logo -->
  <text x="226" y="48" text-anchor="end" font-family="ui-sans-serif,sans-serif" font-size="42" font-weight="900" fill="#20beff" fill-opacity="0.85">K</text>
  <!-- LIVE badge -->
  <rect x="175" y="95" width="50" height="20" rx="5" fill="rgba(32,190,255,0.15)" stroke="rgba(32,190,255,0.45)" stroke-width="1"/>
  <circle cx="183" cy="105" r="3" fill="#4ade80"/>
  <text x="205" y="109" text-anchor="middle" font-family="ui-sans-serif,sans-serif" font-size="9" font-weight="700" fill="#20beff" letter-spacing="0.08em">LIVE</text>
</svg>

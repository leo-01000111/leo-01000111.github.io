<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 68">
  <rect width="120" height="68" fill="#07101a"/>
  <!-- Podium bars -->
  <rect x="44" y="18" width="32" height="42" rx="2" fill="#38bdf8" opacity="0.85"/>
  <rect x="8"  y="30" width="30" height="30" rx="2" fill="#a78bfa" opacity="0.75"/>
  <rect x="82" y="38" width="30" height="22" rx="2" fill="#0ea5e9" opacity="0.6"/>
  <!-- Step line -->
  <polyline points="8,60 8,30 38,30 38,18 76,18 76,38 82,38 82,60" fill="none" stroke="#1e3a5f" stroke-width="0.8"/>
  <!-- Position labels -->
  <text x="60" y="14" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="bold">1</text>
  <text x="23" y="26" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="bold">2</text>
  <text x="97" y="34" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="bold">3</text>
  <!-- Probability bars behind -->
  <rect x="8" y="62" width="30" height="2" rx="1" fill="#a78bfa" opacity="0.5"/>
  <rect x="44" y="62" width="32" height="2" rx="1" fill="#38bdf8" opacity="0.7"/>
  <rect x="82" y="62" width="30" height="2" rx="1" fill="#0ea5e9" opacity="0.45"/>
  <!-- Label -->
  <text x="60" y="8" text-anchor="middle" fill="#a78bfa" font-family="monospace" font-size="5.5" letter-spacing="0.5" opacity="0.8">F1 PREDICTOR</text>
</svg>

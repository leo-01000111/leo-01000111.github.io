  <circle cx="122" cy="67" r="6.5" fill="rgba(76,201,230,0.28)" stroke="#4cc9e6" stroke-width="1.6"/>
  <circle cx="122" cy="77" r="6" fill="rgba(76,201,230,0.18)" stroke="#4cc9e6" stroke-width="1.3"/>


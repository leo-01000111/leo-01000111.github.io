  <polygon points="77,67 73,64 73,70" fill="rgba(76,201,230,0.5)"/>

  <!-- Connections layer 1→2 -->
  <line x1="88" y1="50" x2="122" y2="57" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="50" x2="122" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="50" x2="122" y2="77" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="67" x2="122" y2="57" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="67" x2="122" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="67" x2="122" y2="77" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="84" x2="122" y2="57" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="84" x2="122" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="88" y1="84" x2="122" y2="77" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>

  <!-- Layer 1 nodes -->
  <circle cx="88" cy="50" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>
  <circle cx="88" cy="67" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>
  <circle cx="88" cy="84" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>


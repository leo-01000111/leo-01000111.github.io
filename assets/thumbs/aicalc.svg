  <line x1="127" y1="57" x2="155" y2="50" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="57" x2="155" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="57" x2="155" y2="84" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="67" x2="155" y2="50" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="67" x2="155" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="67" x2="155" y2="84" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="77" x2="155" y2="50" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="77" x2="155" y2="67" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>
  <line x1="127" y1="77" x2="155" y2="84" stroke="rgba(76,201,230,0.12)" stroke-width="0.7"/>


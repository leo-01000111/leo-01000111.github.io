  <circle cx="160" cy="50" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>
  <circle cx="160" cy="67" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>
  <circle cx="160" cy="84" r="5.5" fill="#0d1520" stroke="#4cc9e6" stroke-width="1"/>

  <!-- Arrow right to output -->
  <line x1="166" y1="67" x2="179" y2="67" stroke="rgba(76,201,230,0.5)" stroke-width="1.5"/>
  <polygon points="179,67 175,64 175,70" fill="rgba(76,201,230,0.5)"/>

  <!-- Output box -->
  <rect x="181" y="48" width="48" height="38" rx="5" fill="rgba(76,201,230,0.12)" stroke="rgba(76,201,230,0.6)" stroke-width="1"/>
  <text x="205" y="62" text-anchor="middle" font-family="ui-monospace,monospace" font-size="6.5" fill="rgba(76,201,230,0.6)" letter-spacing="0.12em">OUTPUT</text>
  <text x="205" y="79" text-anchor="middle" font-family="ui-monospace,monospace" font-size="14" font-weight="700" fill="#4cc9e6">10</text>


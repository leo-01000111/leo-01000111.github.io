  <rect x="182" y="112" width="48" height="14" rx="3" fill="rgba(76,201,230,0.07)" stroke="rgba(76,201,230,0.2)" stroke-width="0.8"/>
  <text x="206" y="122" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7" fill="rgba(76,201,230,0.6)" letter-spacing="0.1em">GROKKING</text>


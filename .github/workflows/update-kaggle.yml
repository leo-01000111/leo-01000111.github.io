name: Update Kaggle Scores

on:
  schedule:
    # Runs daily at 04:00 UTC (low-traffic window)
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Also allows a manual trigger from the Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the updated JSON

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install kaggle

      - name: Configure Kaggle credentials
        env:
          KAGGLE_TOKEN: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p ~/.kaggle
          printf '{"token":"%s"}' "$KAGGLE_TOKEN" > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Fetch Kaggle leaderboard scores
        env:
          KAGGLE_TOKEN: ${{ secrets.KAGGLE_KEY }}
        run: python scripts/update_kaggle.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/kaggle-scores.json
          if git diff --staged --quiet; then
            echo "No changes — scores unchanged."
          else
            git commit -m "chore: update Kaggle scores [skip ci]"
            git push
          fi
